<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Controle Bibliotecario</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="header-placeholder"></div>
    <div>
      <button id="AddBook" onclick="addbook()">Adicionar Livros</button>
      <button id="addaluno" onclick="addaluno()">Adicionar Estudantes</button>
      <button id="Busca" onclick="buscabook()">Procurar Livros</button>
      <div id="formadd">
        <form id="formbook">
          <h3>Novo Livro</h3>
          <input
            type="text"
            name="titlebook"
            id="titlebook"
            placeholder="Título do Livro"
          />
          <br />
          <h3>Novo Autor</h3>
          <input
            type="text"
            name="authorbook"
            id="authorbook"
            placeholder="Nome do Autor"
          />
          <br />
          <h3>Categoria</h3>
          <select id="CategoriaSelect" onchange="toggleOutroInput()">
            <option value="" disabled selected>Selecione uma categoria</option>
            <optgroup label="Ficção">
              <option value="Romance">Romance</option>
              <option value="Fantasia">Fantasia</option>
              <option value="Ficção Científica">Ficção Científica</option>
              <option value="Suspense/Policial">Suspense/Policial</option>
              <option value="Terror/Horror">Terror/Horror</option>
              <option value="Distopia">Distopia</option>
              <option value="Aventura">Aventura</option>
              <option value="Conto">Conto</option>
              <option value="Novela">Novela</option>
            </optgroup>
            <optgroup label="Não Ficção">
              <option value="Biografia/Autobiografia">
                Biografia/Autobiografia
              </option>
              <option value="Autoajuda">Autoajuda</option>
              <option value="Didáticos">Didáticos</option>
              <option value="Religiosos">Religiosos</option>
              <option value="História/Política/Filosofia">
                História/Política/Filosofia
              </option>
            </optgroup>
            <optgroup label="Outros Gêneros">
              <option value="Poesia/Lírico">Poesia/Lírico</option>
              <option value="Histórias em Quadrinhos (HQs/Mangás)">
                Histórias em Quadrinhos (HQs/Mangás)
              </option>
              <option value="Teatro (Dramático)">Teatro (Dramático)</option>
            </optgroup>
            <option value="Outro">Outro</option>
          </select>

          <div id="outroCategoriaDiv" style="display: none; margin-top: 10px">
            <h3>Especifique a Categoria</h3>
            <input
              type="text"
              id="CategoriaOutro"
              placeholder="Digite o gênero"
            />
          </div>

          <button type="submit">Cadastrar Livro</button>
        </form>
      </div>

      <div id="addalunocreate">
        <form id="formaluno">
          <h3>Novo Aluno</h3>
          <input type="text" name="nomealuno" id="nomealuno" />
          <br />
          <h3>Email</h3>
          <input type="text" name="email" id="email" />
          <br />
          <h3>Matricula</h3>
          <input type="text" name="matricula" id="matricula" />
          <br />
          <h3>Série</h3>
          <input type="text" name="serie" id="serie" />
          <br />
          <h3>Data registro</h3>
          <input type="date" name="registro" id="registro" />
          <br />
          <br />
          <button type="submit">Novo Aluno</button>
        </form>
      </div>

      <div id="formbausca">
        <form id="formSearchBook">
          <h3>Nome do Livro</h3>
          <input
            type="text"
            id="searchBook"
            placeholder="Digite o nome do livro..."
            autocomplete="off"
          />
          <ul id="suggestions"></ul>

          <div
            id="areaEmprestimo"
            style="
              display: none;
              margin-top: 20px;
              border-top: 1px solid #eee;
              padding-top: 15px;
            "
          >
            <h3>Vincular Aluno (Nome ou Matrícula)</h3>
            <input
              type="text"
              id="alunoEmprestimo"
              placeholder="Quem está levando o livro?"
            />
            <input type="hidden" id="idBookSelecionado" />
            <button id="btnLend" type="submit">Confirmar Empréstimo</button>
          </div>
        </form>
      </div>
    </div>
    <div id="footer-placeholder"></div>
    <script src="main.js"></script>
  </body>
</html>
